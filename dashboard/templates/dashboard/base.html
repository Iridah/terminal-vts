{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS - MARTILLO VIL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{% static 'dashboard/js/main.js' %}"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-hammer"></i> VTS-MARTILLO VIL
        </div>
        <nav class="nav-menu">
            <a href="{% url 'home' %}" class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <i class="fa-solid fa-house"></i> Resumen General
            </a>
            <a href="{% url 'inventario' %}" class="nav-item {% if request.resolver_match.url_name == 'inventario' %}active{% endif %}">
                <i class="fa-solid fa-boxes-stacked"></i> Forja de Inventario
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-line"></i> Análisis Pro
            </a>
            <a href="{% url 'lista_logs' %}" class="nav-item {% if request.resolver_match.url_name == 'lista_logs' %}active{% endif %}">
                <i class="fa-solid fa-clock-rotate-left"></i> Logs de Sistema
            </a>
        </nav>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
