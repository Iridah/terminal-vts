<!-- dashboard/templates/dashboard/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS - MARTILLO VIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-hammer"></i> <span>VTS-MV</span>
        </div>
        <nav class="nav-menu">
            <a href="{% url 'home' %}" class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <i class="fa-solid fa-house"></i> <span>Resumen General</span>
            </a>
            <a href="{% url 'inventario' %}" class="nav-item {% if request.resolver_match.url_name == 'inventario' %}active{% endif %}">
                <i class="fa-solid fa-boxes-stacked"></i> <span>La Forja</span>
            </a>
            <a href="{% url 'analisis_pro' %}" class="nav-item {% if request.resolver_match.url_name == 'analisis_pro' %}active{% endif %}">
                <i class="fa-solid fa-chart-line"></i> <span>Análisis Pro</span>
            </a>
            <a href="{% url 'lista_logs' %}" class="nav-item {% if request.resolver_match.url_name == 'lista_logs' %}active{% endif %}">
                <i class="fa-solid fa-clock-rotate-left"></i> <span>Logs Sistema</span>
            </a>
        </nav>
        <div class="nav-menu mt-auto border-top">
            <a href="/admin/" class="nav-item"><i class="fa-solid fa-gears"></i> <span>Panel Admin</span></a>
        </div>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-4 shadow-sm">
            <div>
                <h2 class="m-0 fw-bold text-dark">{% block header_title %}Panel de Control{% endblock %}</h2>
                <small class="text-secondary">VTS Engine v2.7.5 | Mardum</small>
            </div>
            
            <div class="d-flex align-items-center gap-4">
                <div class="text-end border-end pe-4 d-none d-md-block">
                    <div id="live-clock" class="fw-bold fs-4" style="color: var(--skydash-blue);">00:00:00</div>
                    <div class="small text-muted"><i class="fas fa-sun text-warning"></i> Santiago, Recoleta: 29°C</div>
                </div>
                <div class="v-store-brand">
                    <img src="{% static 'dashboard/img/Vaca.png' %}" alt="V-Store" class="rounded-circle border border-2 border-primary" style="width: 55px; height: 55px; object-fit: cover;">
                </div>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'dashboard/js/main.js' %}"></script>
</body>
</html>
