<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martillo Vil - Dashboard VTS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50; /* Un azul oscuro, estilo terminal */
            color: #ecf0f1; /* Letra blanca-gris claro */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #f39c12; /* Naranja brillante para títulos */
            margin-bottom: 30px;
        }
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .chart-card {
            background-color: #34495e; /* Un gris más claro para las tarjetas */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }
        canvas {
            max-height: 400px;
        }
    </style>
</head>
<body>
    <h1>Panel de Control - Auditorías VTS</h1>

    <div class="dashboard-container">
        <div class="chart-card">
            <h2>Estado de la Auditoría General</h2>
            <canvas id="estadoAuditoriaChart"></canvas>
            <p>Total de Registros: {{ total_registros }}</p>
        </div>

        <div class="chart-card">
            <h2>Valor inventario por Sección</h2>
            <canvas id="perdidasSeccionChart"></canvas>
        </div>
    </div>

    <script>
        // Datos para el Gráfico de Torta
        const estadoAuditoriaData = {
            labels: ['Completados ({{ porcentaje_completado }}%)', 'Pendientes ({{ porcentaje_pendiente }}%)'],
            datasets: [{
                data: [{{ completados }}, {{ pendientes }}],
                backgroundColor: ['#27ae60', '#e74c3c'], /* Verde para completado, Rojo para pendiente */
                hoverOffset: 4
            }]
        };

        const estadoAuditoriaConfig = {
            type: 'doughnut',
            data: estadoAuditoriaData,
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#ecf0f1' // Color de las etiquetas de la leyenda
                        }
                    },
                    title: {
                        display: true,
                        text: 'Avance de la Auditoría',
                        color: '#f39c12' // Color del título del gráfico
                    }
                }
            }
        };

        new Chart(
            document.getElementById('estadoAuditoriaChart'),
            estadoAuditoriaConfig
        );

        // Datos para el Gráfico de Barras
        const perdidasSeccionData = {
            labels: {{ secciones_labels|safe }}, /* Los nombres de las secciones */
            datasets: [{
                label: 'Valor inventario ($)',
                data: {{ total_perdido_data|safe }}, /* Los valores de pérdida */
                backgroundColor: '#e67e22', /* Naranja para las barras */
                borderColor: '#d35400',
                borderWidth: 1
            }]
        };  

        const perdidasSeccionConfig = {
            type: 'bar',
            data: perdidasSeccionData,
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#ecf0f1'
                        }
                    },
                    title: {
                        display: true,
                        text: 'Valor inventario por Sección',
                        color: '#f39c12'
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#ecf0f1' // Color de las etiquetas del eje X
                        },
                        grid: {
                            color: 'rgba(236, 240, 241, 0.1)' // Color tenue de las líneas de la grilla
                        }
                    },
                    y: {
                        ticks: {
                            color: '#ecf0f1', // Color de las etiquetas del eje Y
                            callback: function(value, index, values) {
                                return '$' + value.toLocaleString(); // Formato de moneda
                            }
                        },
                        grid: {
                            color: 'rgba(236, 240, 241, 0.1)'
                        }
                    }
                }
            }
        };

        new Chart(
            document.getElementById('perdidasSeccionChart'),
            perdidasSeccionConfig
        );
    </script>
</body>
</html>
