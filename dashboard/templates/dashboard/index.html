{% extends 'dashboard/base.html' %}

{% block content %}
<div style="margin-bottom: 30px;">
    <h1 style="color: #2D2D2D; font-weight: 700; margin: 0;">Panel de Control</h1>
    <p style="color: #6C7383;">Estado operativo del inventario VTS</p>
</div>

<div style="display: grid; grid-template-columns: 1.6fr 1fr; gap: 25px;">
    
    <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
        <h3 style="color: #4B49AC; margin-top: 0;"><i class="fa-solid fa-money-bill-trend-up"></i> Valor por Sección</h3>
        <canvas id="perdidasSeccionChart" style="max-height: 300px;"></canvas>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="background: #7DA0FA; color: white; padding: 25px; border-radius: 20px; position: relative; overflow: hidden;">
            <i class="fa-solid fa-box" style="position: absolute; right: 10px; bottom: 10px; font-size: 3em; opacity: 0.2;"></i>
            <span style="font-weight: 600;">Total SKU</span>
            <h2 style="font-size: 2.2em; margin: 10px 0;">{{ total_productos }}</h2>
        </div>
        <div style="background: #4B49AC; color: white; padding: 25px; border-radius: 20px; position: relative; overflow: hidden;">
            <i class="fa-solid fa-dollar-sign" style="position: absolute; right: 10px; bottom: 10px; font-size: 3em; opacity: 0.2;"></i>
            <span style="font-weight: 600;">Capital</span>
            <h2 style="font-size: 2.2em; margin: 10px 0;">${{ capital_total|floatformat:0 }}</h2>
        </div>
        <div style="background: #7978E9; color: white; padding: 25px; border-radius: 20px;">
            <span style="font-weight: 600;">Progreso</span>
            <h2 style="font-size: 2.2em; margin: 10px 0;">{{ porcentaje_completado }}%</h2>
        </div>
        <div style="background: #F3797E; color: white; padding: 25px; border-radius: 20px;">
            <span style="font-weight: 600;">Quiebres</span>
            <h2 style="font-size: 2.2em; margin: 10px 0;">{{ alertas_stock }}</h2>
        </div>
    </div>
</div>

<script>
    // Configuración rápida de gráficos con colores de la foto 1
    new Chart(document.getElementById('perdidasSeccionChart'), {
        type: 'bar',
        data: {
            labels: {{ secciones_labels|safe }},
            datasets: [{
                label: 'Capital en Sistema',
                data: {{ total_perdido_data|safe }},
                backgroundColor: '#7DA0FA',
                borderRadius: 8
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });
</script>
{% endblock %}
